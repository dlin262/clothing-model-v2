<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="STCKD Staff" />
  <title>STCKD Staff</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#0a0a0a;--bone:#f5f2ed;--warm:#e8e2d9;--accent:#c8ff00;--red:#ff3b30;--green:#22c55e;--muted:#7a7670;--border:#d4cfc8;--r:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bone);color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

    header{background:var(--ink);padding:14px 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;padding-top:calc(14px + env(safe-area-inset-top))}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--accent)}
    .logout{font-size:11px;color:#7a7670;text-decoration:none;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border:1px solid #2a2a2a;border-radius:6px}

    .tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:40}
    .tab{flex:1;padding:14px;text-align:center;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s}
    .tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}

    .view{display:none;padding:16px}
    .view.active{display:block}

    /* Add item form */
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    label.field-label{display:block;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
    input[type=text],input[type=number],select,textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
    input:focus,select:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(10,10,10,.06)}
    .price-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .profit-pill{background:var(--bone);border:1px solid var(--border);border-radius:50px;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:14px}
    .profit-pill strong{font-size:16px}

    /* Camera / image capture */
    .camera-box{border:2px dashed var(--border);border-radius:var(--r);background:#fff;text-align:center;padding:24px 16px;cursor:pointer;position:relative;transition:.2s;overflow:hidden}
    .camera-box:active{background:var(--warm)}
    .camera-box input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .camera-icon{font-size:32px;margin-bottom:6px}
    .camera-label{font-size:13px;color:var(--muted)}
    #staff-preview{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:200px;object-fit:cover}

    .btn-add{width:100%;background:var(--ink);color:var(--accent);border:none;border-radius:var(--r);padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;transition:.2s;margin-top:6px}
    .btn-add:active{transform:scale(.97)}

    /* Sell view */
    .item-list{display:flex;flex-direction:column;gap:10px}
    .item-row{background:#fff;border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:.15s}
    .item-row:active{background:var(--warm)}
    .item-thumb{width:48px;height:64px;border-radius:6px;object-fit:cover;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
    .item-thumb img{width:100%;height:100%;object-fit:cover}
    .item-info{flex:1;min-width:0}
    .item-name{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .item-qty{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ink)}
    .qty-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
    .qty-badge.in{background:var(--accent);color:var(--ink)}
    .qty-badge.out{background:var(--red);color:#fff}

    /* Sell modal */
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px}
    .btn-confirm{width:100%;background:var(--ink);color:var(--accent);border:none;border-radius:var(--r);padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;margin-top:12px}
    .btn-cancel-sm{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);margin-top:8px}

    /* Toast */
    #toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--accent);padding:12px 24px;border-radius:50px;font-size:14px;opacity:0;transition:.3s;white-space:nowrap;z-index:999;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .search-bar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:16px;width:100%;margin-bottom:14px;outline:none}
    .search-bar:focus{border-color:var(--ink)}
  </style>
</head>
<body>
<header>
  <div class="logo">STCKD</div>
  <a href="/logout" class="logout">Logout</a>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add',this)">Add Item</div>
  <div class="tab" onclick="switchTab('sell',this)">Record Sale</div>
</div>

<!-- ADD ITEM -->
<div class="view active" id="view-add">
  <div class="section-title">New Item</div>
  <form id="staff-form" enctype="multipart/form-data">
    <div class="form-group">
      <label class="field-label">Item Name</label>
      <input type="text" name="name" placeholder="e.g. Floral Dress" required autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="field-label">Category</label>
      <select name="category">
        <option>Tops</option><option>Bottoms</option><option>Dresses</option>
        <option>Outerwear</option><option>Footwear</option><option>Accessories</option><option>General</option>
      </select>
    </div>
    <div class="form-group">
      <label class="field-label">Quantity</label>
      <input type="number" name="quantity" min="1" value="1" required inputmode="numeric" />
    </div>
    <div class="price-row">
      <div class="form-group">
        <label class="field-label">Buy Price (฿)</label>
        <input type="number" name="buy_price" id="s-buy" min="0" step="1" placeholder="0" oninput="calcProfit()" inputmode="decimal" />
      </div>
      <div class="form-group">
        <label class="field-label">Sale Price (฿)</label>
        <input type="number" name="sale_price" id="s-sale" min="0" step="1" placeholder="0" oninput="calcProfit()" inputmode="decimal" />
      </div>
    </div>
    <div class="profit-pill">
      <span>Profit / unit</span>
      <strong id="s-profit" style="color:var(--green)">฿0</strong>
    </div>
    <div class="form-group">
      <label class="field-label">Photo</label>
      <div class="camera-box" id="cam-box">
        <input type="file" name="image" accept="image/*" capture="environment" id="s-img" />
        <div class="camera-icon">📷</div>
        <div class="camera-label">Tap to take photo or choose from library</div>
        <img id="staff-preview" src="" alt="" />
      </div>
    </div>
    <button type="submit" class="btn-add">＋ Add to Inventory</button>
  </form>
</div>

<!-- SELL -->
<div class="view" id="view-sell">
  <input class="search-bar" type="text" placeholder="Search item…" oninput="filterSellList(this.value)" />
  <div class="item-list" id="sell-list">
    <div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>
  </div>
</div>

<!-- Sell Modal -->
<div class="modal-backdrop" id="sell-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-name">Record Sale</div>
    <input type="hidden" id="modal-id" />
    <div class="form-group">
      <label class="field-label">Quantity</label>
      <input type="number" id="modal-qty" min="1" value="1" inputmode="numeric" oninput="calcModalProfit()" />
    </div>
    <div class="form-group">
      <label class="field-label">Actual Sale Price (฿)</label>
      <input type="number" id="modal-price" inputmode="decimal" oninput="calcModalProfit()" />
    </div>
    <div class="form-group">
      <label class="field-label">Note (optional)</label>
      <input type="text" id="modal-note" placeholder="e.g. discount, gift" />
    </div>
    <div class="profit-pill">
      <span>Profit this sale</span>
      <strong id="modal-profit" style="color:var(--green)">฿0</strong>
    </div>
    <button class="btn-confirm" onclick="submitSale()">Confirm Sale</button>
    <button class="btn-cancel-sm" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
  let allItems = [], sellBuyPrice = 0;

  async function loadItems() {
    const res = await fetch('/api/items');
    allItems = await res.json();
    renderSellList(allItems);
  }

  function renderSellList(items) {
    const list = document.getElementById('sell-list');
    if (!items.length) {
      list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">No items found</div>';
      return;
    }
    list.innerHTML = items.map(item => `
      <div class="item-row" onclick="openModal(${item.id},'${esc(item.name)}',${item.sale_price},${item.buy_price},${item.quantity})">
        <div class="item-thumb">
          ${item.image_path
            ? `<img src="/${item.image_path}" />`
            : '👕'}
        </div>
        <div class="item-info">
          <div class="item-name">${esc(item.name)}</div>
          <div class="item-meta">฿${fmt(item.sale_price)} · <span class="qty-badge ${item.quantity>0?'in':'out'}">${item.quantity>0?'In stock':'Out'}</span></div>
        </div>
        <div class="item-qty">${item.quantity}</div>
      </div>
    `).join('');
  }

  function filterSellList(q) {
    const filtered = allItems.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
    renderSellList(filtered);
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('view-' + tab).classList.add('active');
    if (tab === 'sell') loadItems();
  }

  // Photo preview
  document.getElementById('s-img').addEventListener('change', function() {
    const f = this.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => { const img = document.getElementById('staff-preview'); img.src = e.target.result; img.style.display = 'block'; };
    r.readAsDataURL(f);
  });

  function calcProfit() {
    const b = parseFloat(document.getElementById('s-buy').value) || 0;
    const s = parseFloat(document.getElementById('s-sale').value) || 0;
    const p = s - b;
    const el = document.getElementById('s-profit');
    el.textContent = '฿' + fmt(p);
    el.style.color = p >= 0 ? 'var(--green)' : 'var(--red)';
  }

  document.getElementById('staff-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Saving…'; btn.disabled = true;
    try {
      const fd = new FormData(e.target);
      const res = await fetch('/api/items', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      e.target.reset();
      document.getElementById('staff-preview').style.display = 'none';
      document.getElementById('s-profit').textContent = '฿0';
      showToast('Added ✓');
    } catch (err) { showToast('Error: ' + err.message); }
    btn.textContent = '＋ Add to Inventory'; btn.disabled = false;
  });

  // Sell modal
  function openModal(id, name, price, buyPrice, qty) {
    if (qty <= 0) { showToast('Out of stock!'); return; }
    sellBuyPrice = buyPrice;
    document.getElementById('modal-id').value = id;
    document.getElementById('modal-name').textContent = name;
    document.getElementById('modal-price').value = price;
    document.getElementById('modal-qty').value = 1;
    document.getElementById('modal-note').value = '';
    calcModalProfit();
    document.getElementById('sell-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('sell-modal').classList.remove('open'); }

  function calcModalProfit() {
    const qty   = parseInt(document.getElementById('modal-qty').value) || 0;
    const price = parseFloat(document.getElementById('modal-price').value) || 0;
    const pft   = (price - sellBuyPrice) * qty;
    const el = document.getElementById('modal-profit');
    el.textContent = '฿' + fmt(pft);
    el.style.color = pft >= 0 ? 'var(--green)' : 'var(--red)';
  }

  async function submitSale() {
    const id    = document.getElementById('modal-id').value;
    const qty   = parseInt(document.getElementById('modal-qty').value);
    const price = parseFloat(document.getElementById('modal-price').value);
    const note  = document.getElementById('modal-note').value;
    const res = await fetch(`/api/items/${id}/sell`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quantity: qty, sale_price: price, note })
    });
    const data = await res.json();
    if (data.error) { showToast('Error: ' + data.error); return; }
    closeModal(); showToast('Sale recorded ✓'); loadItems();
  }

  function fmt(n) { return Math.round(Number(n||0)).toLocaleString(); }
  function esc(s) { return String(s).replace(/'/g, "\\'"); }
  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadItems();
</script>
</body>
</html>
