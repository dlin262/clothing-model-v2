<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="MOCHI Staff" />
  <title>MOCHI Staff</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#0a0a0a;--bone:#f5f2ed;--warm:#e8e2d9;--accent:#c8ff00;--red:#ff3b30;--green:#22c55e;--muted:#7a7670;--border:#d4cfc8;--r:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bone);color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
    header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;padding-top:calc(14px + env(safe-area-inset-top))}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--accent)}
    .header-right{display:flex;align-items:center;gap:8px}
    .lang-toggle{display:flex;border:1px solid #2a2a2a;border-radius:20px;overflow:hidden}
    .lang-btn{background:none;border:none;color:#7a7670;padding:4px 10px;font-size:10px;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif}
    .lang-btn.active{background:#c8ff00;color:#0a0a0a;font-weight:500}
    .logout{font-size:11px;color:#7a7670;text-decoration:none;letter-spacing:1px;padding:5px 10px;border:1px solid #2a2a2a;border-radius:6px}
    .tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:40}
    .tab{flex:1;padding:14px;text-align:center;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s}
    .tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
    .view{display:none;padding:16px}.view.active{display:block}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    label.fl{display:block;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
    input[type=text],input[type=number],select{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;-webkit-appearance:none}
    input:focus,select:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(10,10,10,.06)}
    .price-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .profit-pill{background:var(--bone);border:1px solid var(--border);border-radius:50px;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:14px}
    .profit-pill strong{font-size:16px}
    .camera-box{border:2px dashed var(--border);border-radius:var(--r);background:#fff;text-align:center;padding:24px 16px;cursor:pointer;position:relative;transition:.2s;overflow:hidden}
    .camera-box:active{background:var(--warm)}
    .camera-box input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .camera-icon{font-size:32px;margin-bottom:6px}
    .camera-label{font-size:13px;color:var(--muted)}
    #staff-preview{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:200px;object-fit:cover}
    .btn-add{width:100%;background:var(--ink);color:var(--accent);border:none;border-radius:var(--r);padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;margin-top:6px}
    .btn-add:active{transform:scale(.97)}
    .item-list{display:flex;flex-direction:column;gap:10px}
    .item-row{background:#fff;border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:.15s}
    .item-row:active{background:var(--warm)}
    .item-thumb{width:48px;height:64px;border-radius:6px;object-fit:cover;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
    .item-thumb img{width:100%;height:100%;object-fit:cover}
    .item-info{flex:1;min-width:0}
    .item-name{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .item-qty{font-family:'Bebas Neue',sans-serif;font-size:22px}
    .qty-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
    .qty-badge.in{background:var(--accent);color:var(--ink)}.qty-badge.out{background:var(--red);color:#fff}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:16px}
    .btn-confirm{width:100%;background:var(--ink);color:var(--accent);border:none;border-radius:var(--r);padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;margin-top:12px}
    .btn-cancel-sm{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);margin-top:8px}
    #toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--accent);padding:12px 24px;border-radius:50px;font-size:14px;opacity:0;transition:.3s;white-space:nowrap;z-index:999;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .search-bar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:16px;width:100%;margin-bottom:14px;outline:none}
    .search-bar:focus{border-color:var(--ink)}
  </style>
</head>
<body>
<header>
  <div class="logo">MOCHI</div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('mm',this)">မြန်မာ</button>
    </div>
    <a href="/logout" class="logout" id="logout-btn">Logout</a>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-add" onclick="switchTab('add',this)" data-en="Add Item" data-mm="ပစ္စည်းထည့်">Add Item</div>
  <div class="tab" id="tab-sell" onclick="switchTab('sell',this)" data-en="Record Sale" data-mm="ရောင်းချမှု">Record Sale</div>
</div>

<div class="view active" id="view-add">
  <div class="section-title" data-en="New Item" data-mm="ပစ္စည်းအသစ်" id="add-title">New Item</div>
  <form id="staff-form" enctype="multipart/form-data">
    <div class="form-group">
      <label class="fl" data-en="Item Name" data-mm="ပစ္စည်းအမည်">Item Name</label>
      <input type="text" name="name" id="name-input" placeholder="e.g. Floral Dress" required autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="fl" data-en="Category" data-mm="အမျိုးအစား">Category</label>
      <select name="category">
        <option>Tops</option><option>Bottoms</option><option>Dresses</option>
        <option>Outerwear</option><option>Footwear</option><option>Accessories</option><option>General</option>
      </select>
    </div>
    <div class="form-group">
      <label class="fl" data-en="Quantity" data-mm="အရေအတွက်">Quantity</label>
      <input type="number" name="quantity" min="1" value="1" required inputmode="numeric" />
    </div>
    <div class="price-row">
      <div class="form-group">
        <label class="fl" data-en="Buy Price (MMK)" data-mm="ဝယ်ဈေး (MMK)">Buy Price (MMK)</label>
        <input type="number" name="buy_price" id="s-buy" min="0" step="1" placeholder="0" oninput="calcProfit()" inputmode="decimal" />
      </div>
      <div class="form-group">
        <label class="fl" data-en="Sale Price (MMK)" data-mm="ရောင်းဈေး (MMK)">Sale Price (MMK)</label>
        <input type="number" name="sale_price" id="s-sale" min="0" step="1" placeholder="0" oninput="calcProfit()" inputmode="decimal" />
      </div>
    </div>
    <div class="profit-pill">
      <span id="profit-label" data-en="Profit / unit" data-mm="အမြတ် / ပစ္စည်း">Profit / unit</span>
      <strong id="s-profit" style="color:var(--green)">MMK 0</strong>
    </div>
    <div class="form-group">
      <label class="fl" data-en="Photo" data-mm="ဓာတ်ပုံ">Photo</label>
      <div class="camera-box">
        <input type="file" name="image" accept="image/*" capture="environment" id="s-img" />
        <div class="camera-icon">📷</div>
        <div class="camera-label" data-en="Tap to take photo or choose from library" data-mm="ဓာတ်ပုံရိုက်ရန် သို့မဟုတ် ရွေးချယ်ရန် နှိပ်ပါ">Tap to take photo or choose from library</div>
        <img id="staff-preview" src="" alt="" />
      </div>
    </div>
    <button type="submit" class="btn-add" id="btn-add-item" data-en="＋ Add to Inventory" data-mm="＋ စာရင်းထည့်မည်">＋ Add to Inventory</button>
  </form>
</div>

<div class="view" id="view-sell">
  <input class="search-bar" type="text" id="search-bar" placeholder="Search item…" oninput="filterSellList(this.value)" data-en-placeholder="Search item…" data-mm-placeholder="ပစ္စည်းရှာပါ…" />
  <div class="item-list" id="sell-list"><div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div></div>
</div>

<div class="modal-backdrop" id="sell-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-name">Record Sale</div>
    <input type="hidden" id="modal-id" />
    <div class="form-group">
      <label class="fl" data-en="Quantity" data-mm="အရေအတွက်">Quantity</label>
      <input type="number" id="modal-qty" min="1" value="1" inputmode="numeric" oninput="calcModalProfit()" />
    </div>
    <div class="form-group">
      <label class="fl" data-en="Actual Sale Price (MMK)" data-mm="တကယ်ရောင်းဈေး (MMK)">Actual Sale Price (MMK)</label>
      <input type="number" id="modal-price" inputmode="decimal" oninput="calcModalProfit()" />
    </div>
    <div class="form-group">
      <label class="fl" data-en="Note (optional)" data-mm="မှတ်ချက် (ရှိလျှင်)">Note (optional)</label>
      <input type="text" id="modal-note" placeholder="e.g. discount" />
    </div>
    <div class="profit-pill">
      <span data-en="Profit this sale" data-mm="ဤရောင်းချမှု အမြတ်">Profit this sale</span>
      <strong id="modal-profit" style="color:var(--green)">MMK 0</strong>
    </div>
    <button class="btn-confirm" id="btn-confirm" onclick="submitSale()" data-en="Confirm Sale" data-mm="အတည်ပြုမည်">Confirm Sale</button>
    <button class="btn-cancel-sm" id="btn-cancel" onclick="closeModal()" data-en="Cancel" data-mm="မလုပ်တော့">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
  let allItems = [], sellBuyPrice = 0, currentLang = 'en';

  const T = {
    en: { logout:'Logout', loading:'Loading…', noitems:'No items found', outofstock:'Out of stock!', added:'Added ✓', sale:'Sale recorded ✓', saving:'Saving…' },
    mm: { logout:'ထွက်မည်', loading:'ခဏစောင့်ပါ…', noitems:'ပစ္စည်းမတွေ့ပါ', outofstock:'လက်ကျန်မရှိ!', added:'ထည့်ပြီးပြီ ✓', sale:'မှတ်ပြီးပြီ ✓', saving:'သိမ်းနေသည်…' }
  };

  function setLang(lang, el) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('[data-en]').forEach(el => {
      if(el.getAttribute('data-'+lang)) el.textContent = el.getAttribute('data-'+lang);
    });
    document.querySelectorAll('[data-en-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute('data-'+lang+'-placeholder') || el.getAttribute('data-en-placeholder');
    });
    document.getElementById('logout-btn').textContent = T[lang].logout;
    document.getElementById('name-input').placeholder = lang==='mm' ? 'ဥပမာ - ပန်းချီဝတ်စုံ' : 'e.g. Floral Dress';
    renderSellList(allItems);
  }

  async function loadItems() {
    const res = await fetch('/api/items');
    allItems = await res.json();
    renderSellList(allItems);
  }

  function renderSellList(items) {
    const list = document.getElementById('sell-list');
    if (!items.length) { list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">${T[currentLang].noitems}</div>`; return; }
    list.innerHTML = items.map(item => `
      <div class="item-row" onclick="openModal(${item.id},'${esc(item.name)}',${item.sale_price},${item.buy_price},${item.quantity})">
        <div class="item-thumb">${item.image_path?`<img src="/${item.image_path}"/>`:'👕'}</div>
        <div class="item-info">
          <div class="item-name">${esc(item.name)}</div>
          <div class="item-meta">MMK ${fmt(item.sale_price)} · <span class="qty-badge ${item.quantity>0?'in':'out'}">${item.quantity>0?(currentLang==='mm'?'ရှိသည်':'In stock'):(currentLang==='mm'?'မရှိ':'Out')}</span></div>
        </div>
        <div class="item-qty">${item.quantity}</div>
      </div>`).join('');
  }

  function filterSellList(q) { renderSellList(allItems.filter(i=>i.name.toLowerCase().includes(q.toLowerCase()))); }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('view-'+tab).classList.add('active');
    if(tab==='sell') loadItems();
  }

  document.getElementById('s-img').addEventListener('change',function(){
    const f=this.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=e=>{const img=document.getElementById('staff-preview');img.src=e.target.result;img.style.display='block'}; r.readAsDataURL(f);
  });

  function calcProfit() {
    const p=(parseFloat(document.getElementById('s-sale').value)||0)-(parseFloat(document.getElementById('s-buy').value)||0);
    const el=document.getElementById('s-profit'); el.textContent='MMK '+fmt(p); el.style.color=p>=0?'var(--green)':'var(--red)';
  }

  document.getElementById('staff-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const btn=e.target.querySelector('button'); btn.textContent=T[currentLang].saving; btn.disabled=true;
    try {
      const res=await fetch('/api/items',{method:'POST',body:new FormData(e.target)});
      const data=await res.json(); if(data.error) throw new Error(data.error);
      e.target.reset(); document.getElementById('staff-preview').style.display='none';
      document.getElementById('s-profit').textContent='MMK 0'; showToast(T[currentLang].added);
    } catch(err){showToast('Error: '+err.message);}
    btn.textContent=btn.getAttribute('data-'+currentLang)||btn.getAttribute('data-en'); btn.disabled=false;
  });

  function openModal(id,name,price,buyPrice,qty) {
    if(qty<=0){showToast(T[currentLang].outofstock);return;}
    sellBuyPrice=buyPrice;
    document.getElementById('modal-id').value=id;
    document.getElementById('modal-name').textContent=name;
    document.getElementById('modal-price').value=price;
    document.getElementById('modal-qty').value=1;
    document.getElementById('modal-note').value='';
    calcModalProfit();
    document.getElementById('sell-modal').classList.add('open');
  }
  function closeModal(){document.getElementById('sell-modal').classList.remove('open');}

  function calcModalProfit(){
    const p=(parseFloat(document.getElementById('modal-price').value)||0-sellBuyPrice)*(parseInt(document.getElementById('modal-qty').value)||0);
    const pft=((parseFloat(document.getElementById('modal-price').value)||0)-sellBuyPrice)*(parseInt(document.getElementById('modal-qty').value)||0);
    const el=document.getElementById('modal-profit'); el.textContent='MMK '+fmt(pft); el.style.color=pft>=0?'var(--green)':'var(--red)';
  }

  async function submitSale(){
    const id=document.getElementById('modal-id').value;
    const qty=parseInt(document.getElementById('modal-qty').value);
    const price=parseFloat(document.getElementById('modal-price').value);
    const note=document.getElementById('modal-note').value;
    const res=await fetch(`/api/items/${id}/sell`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quantity:qty,sale_price:price,note})});
    const data=await res.json(); if(data.error){showToast('Error: '+data.error);return;}
    closeModal(); showToast(T[currentLang].sale); loadItems();
  }

  function fmt(n){return Math.round(Number(n||0)).toLocaleString()}
  function esc(s){return String(s).replace(/'/g,"\\'")}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

  loadItems();
</script>
</body>
</html>
